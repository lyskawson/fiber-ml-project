line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "ANN"]
ignore = [
    "ANN101",  # missing type annotation for self
    "ANN102",  # missing type annotation for cls
]

[lint.per-file-ignores]
"tests/**" = ["ANN"]
"scripts/**" = ["ANN"]
"notebooks/**" = ["ANN", "E402"]
