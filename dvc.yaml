stages:
  build_manifest:
    cmd: python scripts/01_build_manifest.py --data-dir data/raw --output data/manifest.csv
    deps:
      - data/raw
      - scripts/01_build_manifest.py
      - src/fiber_ml/ingest/manifest.py
    outs:
      - data/manifest.csv:
          cache: false

  ingest:
    cmd: python scripts/02_ingest_to_zarr.py --manifest data/manifest.csv --output data_processed/dataset.zarr
    deps:
      - data/manifest.csv
      - data/raw
      - scripts/02_ingest_to_zarr.py
      - src/fiber_ml/ingest/to_zarr.py
    outs:
      - data_processed/dataset.zarr
