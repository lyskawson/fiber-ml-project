repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: "data/sample/"
      - id: trailing-whitespace
        exclude: "data/sample/"
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: pytest-sample
        name: pytest on sample data
        entry: uv run pytest tests/ -x -q
        language: system
        pass_filenames: false
        always_run: false
        types: [python]
